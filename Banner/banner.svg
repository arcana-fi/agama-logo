<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="78%">
      <stop offset="0%"  stop-color="#1d3d2d"/>
      <stop offset="55%" stop-color="#10281c"/>
      <stop offset="100%" stop-color="#05110a"/>
    </radialGradient>

    <radialGradient id="orb" cx="58%" cy="25%" r="78%">
      <stop offset="0%"  stop-color="#2f5a43"/>
      <stop offset="55%" stop-color="#173222"/>
      <stop offset="100%" stop-color="#0a1e14"/>
    </radialGradient>

    <linearGradient id="rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fdf8ed" stop-opacity="0.95"/>
      <stop offset="15%"  stop-color="#fdf8ed" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#fdf8ed" stop-opacity="0.03"/>
      <stop offset="82%"  stop-color="#fdf8ed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fdf8ed" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b8b1a0"/>
      <stop offset="55%"  stop-color="#ebe4d2"/>
      <stop offset="100%" stop-color="#fdf8ed"/>
    </linearGradient>

    <filter id="bloomRim" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="bloomRimSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Outer dashed ring (very faint) -->
  <circle cx="750" cy="250" r="880" fill="none"
          stroke="#fdf8ed" stroke-opacity="0.10" stroke-width="1"
          stroke-dasharray="3 6"/>

  <!-- Faint middle ring -->
  <circle cx="750" cy="250" r="670" fill="none"
          stroke="#fdf8ed" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Orb body -->
  <circle cx="750" cy="250" r="485" fill="url(#orb)"/>

  <!-- Soft outer bloom on rim -->
  <circle cx="750" cy="250" r="485" fill="none"
          stroke="url(#rim)" stroke-width="14" filter="url(#bloomRimSoft)" opacity="0.6"/>

  <!-- Bright bloomed rim -->
  <circle cx="750" cy="250" r="485" fill="none"
          stroke="url(#rim)" stroke-width="5" filter="url(#bloomRim)"/>

  <!-- Crisp rim edge -->
  <circle cx="750" cy="250" r="485" fill="none"
          stroke="url(#rim)" stroke-width="1.4"/>

  <!-- Top center: logo mark + wordmark on one line -->
  <g transform="translate(750, 85)" text-anchor="middle">
    <!-- Icon -->
    <g transform="translate(-130, -4)">
      <g transform="scale(0.066) translate(-496, -308)" fill="#fdf8ed">
        <path d="M 584.72 504.09 C 567.71 482.96 549.09 462.72 531.37 441.99 C 513.40 421.51 495.68 400.51 477.32 380.54 C 461.20 394.12 444.13 407.95 423.93 415.32 C 403.98 423.15 381.51 424.21 361.03 417.77 C 319.40 404.66 290.36 369.91 262.33 338.48 C 234.64 305.94 210.36 270.23 192.64 231.26 C 183.72 211.84 176.44 191.65 171.13 170.93 C 166.94 151.12 157.76 127.35 170.83 109.09 C 182.71 98.17 200.28 102.95 214.21 106.46 C 228.73 110.69 242.66 116.82 255.73 124.44 C 281.49 140.38 305.24 159.38 327.97 179.36 C 373.28 219.67 411.92 266.66 452.78 311.30 C 533.05 401.89 612.40 493.60 690.80 585.63 C 721.94 544.52 752.63 502.45 783.01 460.70 C 684.66 359.99 591.72 253.67 493.69 152.39 C 445.14 101.93 384.18 60.28 314.86 45.53 C 247.32 30.47 166.29 44.07 123.09 102.78 C 79.44 161.14 86.92 239.61 103.29 306.29 C 120.98 374.71 159.77 436.61 210.42 485.54 C 260.48 533.67 321.91 577.93 393.77 581.30 C 465.16 585.22 532.04 549.03 584.72 504.09 Z"/>
        <path d="M 735.31 42.47 C 689.61 102.52 644.31 163.55 599.38 224.29 C 617.22 244.73 636.32 264.44 654.73 284.55 C 663.94 294.61 673.30 304.56 682.51 314.64 C 687.21 319.58 691.72 324.72 696.44 329.63 C 701.17 334.41 705.24 340.31 710.58 344.15 C 715.26 338.57 718.84 331.52 723.08 325.37 C 727.16 319.02 731.29 312.70 735.43 306.39 C 743.69 293.74 752.03 281.12 760.29 268.47 C 776.97 243.26 793.61 218.03 810.38 192.87 C 827.09 167.69 843.97 142.59 860.75 117.46 C 869.18 104.90 877.71 92.45 886.06 79.86 C 890.29 73.62 894.64 67.45 898.77 61.14 C 900.93 58.05 903.04 54.92 905.13 51.77 C 906.24 50.26 907.30 48.68 908.32 47.09 C 908.89 45.71 911.68 43.81 910.26 42.44 C 851.95 42.25 793.63 42.39 735.31 42.47 Z"/>
      </g>
    </g>
    <!-- Wordmark -->
    <text x="26" y="8"
          font-family="Helvetica Neue, Helvetica, Arial"
          font-size="34" font-weight="500" letter-spacing="0.3"
          fill="#fdf8ed" opacity="0.92">agama.finance</text>
  </g>

  <!-- Main centered headline -->
  <g text-anchor="middle"
     font-family="Helvetica Neue, Helvetica, Arial"
     font-weight="700" letter-spacing="-1.8">
    <text x="750" y="248" font-size="74" fill="url(#textGrad)">The financing layer</text>
    <text x="750" y="332" font-size="74" fill="url(#textGrad)">for tokenized assets</text>
  </g>

  <!-- Testnet footer tag -->
  <text x="750" y="462" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial"
        font-size="19" font-weight="500" letter-spacing="5"
        fill="#fdf8ed" opacity="0.6">TESTNET VERSION</text>
</svg>
